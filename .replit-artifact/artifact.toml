kind = "web"
previewPath = "/"
title = "Чайный квиз"
version = "1.0.0"
id = "artifacts/tea-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23442

[services.development]
run = "pnpm --filter @workspace/tea-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tea-quiz", "run", "build" ]
publicDir = "artifacts/tea-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23442"
BASE_PATH = "/"
